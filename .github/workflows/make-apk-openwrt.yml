name: Build luci-theme-alpha APK (OpenWrt >= 24.xx)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK natively via GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libncurses5-dev libssl-dev python3 \
            python3-setuptools unzip wget zlib1g-dev

      - name: Download OpenWrt SDK (Snapshot with APK support)
        run: |
          # Ambil Snapshot terbaru dengan arsitektur x86_64 yang sudah mensupport obyek APK
          wget https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Configure APK Package Manager
        run: |
          cd openwrt-sdk
          # Aktifkan build APK di SDK OpenWrt terbaru via .config override
          echo "CONFIG_USE_APK=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-alpha=m" >> .config

      - name: Copy package
        run: |
          mkdir -p openwrt-sdk/package/luci-theme-alpha
          # Copy source folder contents to SDK package folder directly
          cp -a ./ openwrt-sdk/package/luci-theme-alpha/
          # Remove SDK folder from inside itself to prevent infinite loop errors
          rm -rf openwrt-sdk/package/luci-theme-alpha/openwrt-sdk*

      - name: Build package
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-theme-alpha/compile V=s

      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-alpha-apk
          path: openwrt-sdk/bin/packages/**/*/*.apk
